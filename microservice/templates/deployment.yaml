apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservice-{{ .Values.color }}
  labels:
    app: microservice
    version: {{ .Values.color }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: microservice
      version: {{ .Values.color }}
  template:
    metadata:
      labels:
        app: microservice
        version: {{ .Values.color }}
    spec:
       containers:
  - name: microservice-blue
    image: sowmiyahemanth/microservice-blue:v1
    ports:
      - containerPort: 80


